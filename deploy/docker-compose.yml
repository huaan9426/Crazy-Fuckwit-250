name: crazy-fuckwit-250

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crazy_fuckwit_250}
      POSTGRES_USER: ${POSTGRES_USER:-crazy_game}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - game-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - game-internal

  api:
    image: alpine:3.21
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command: ["/app/crazy-fuckwit-250-server"]
    environment:
      API_PORT: "3001"
      WEB_ORIGIN: ${WEB_ORIGIN:-https://www.reelrunner.lol}
      DATABASE_URL: postgres://${POSTGRES_USER:-crazy_game}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-crazy_fuckwit_250}?sslmode=disable
    volumes:
      - ./runtime/crazy-fuckwit-250-server:/app/crazy-fuckwit-250-server:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3001/healthz | grep -q '\"database\":\"online\"'"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - game-internal

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./runtime/web:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz | grep -q '\"database\":\"online\"'"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      game-internal:
      reelrunner:
        aliases:
          - crazy-250-web

networks:
  game-internal:
    internal: true
  reelrunner:
    external: true
    name: reelrunner_default

volumes:
  game-db:
